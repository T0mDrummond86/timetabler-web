<style>
.p{ animation: drop 3.4s cubic-bezier(.18,.7,.28,1) infinite; transform-box: fill-box; }
.p0{ animation-delay: .00s } .p1{ animation-delay: .13s }
.p2{ animation-delay: .26s } .p3{ animation-delay: .39s } .p4{ animation-delay: .52s }
@keyframes drop{
  0%   { transform: translateY(-760px); opacity:0 }
  4%   { opacity:1 }
  28%  { transform: translateY(0) }
  34%  { transform: translateY(-24px) }
  40%  { transform: translateY(0) }
  100% { transform: translateY(0) }
}
@media (prefers-reduced-motion: reduce){ .p{ animation:none } }
</style>

