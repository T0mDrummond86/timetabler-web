# Production stack for the Proxmox VM.
# Run with:  docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Only the frontend (Caddy) is published to the host, on ports 80/443. It
# terminates TLS (auto Let's Encrypt), serves the built SPA, and reverse-
# proxies /api to the API container, so the whole app is single-origin.
# Postgres, Redis and the API stay on the internal Docker network.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timetabler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-timetabler}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timetabler} -d ${POSTGRES_DB:-timetabler}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-timetabler}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-timetabler}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ENVIRONMENT: production
      AUTO_CREATE_TABLES: "false"
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD in .env.prod}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env.prod}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
