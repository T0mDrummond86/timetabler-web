[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "timetabler-domain"
version = "0.1.0"
description = "Joondalup Timetable domain logic (core, solver, import/export)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "SQLAlchemy>=2.0,<3",
    "openpyxl>=3.1,<4",
    "ortools>=9.8,<10",
    "numpy>=1.26",
    "pandas>=2.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["timetable*"]
