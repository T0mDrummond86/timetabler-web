# Render Blueprint — timetabler-web (free tier)
# Dashboard: New → Blueprint → connect this repo → apply.
#
# After first deploy: register an admin user, then set ALLOW_REGISTRATION=false on the API.

databases:
  - name: timetabler-db
    plan: free
    databaseName: timetabler

services:
  - type: web
    name: timetabler-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: ALLOW_REGISTRATION
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: timetabler-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: timetabler-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: timetabler-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: timetabler-api
          envVarKey: RENDER_EXTERNAL_URL
