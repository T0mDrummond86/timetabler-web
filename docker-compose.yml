services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: timetabler
      POSTGRES_PASSWORD: timetabler
      POSTGRES_DB: timetabler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetabler -d timetabler"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://timetabler:timetabler@postgres:5432/timetabler
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./packages/domain/timetable:/app/packages/domain/timetable

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - api

volumes:
  pgdata:
